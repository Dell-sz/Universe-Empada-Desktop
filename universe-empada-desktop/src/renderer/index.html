<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universe Empadas</title>
  <link rel="stylesheet" href="styles/main.css">
</head>

<body>
  <div id="app">
    <nav class="sidebar">
      <div class="logo">
        <img src="assets/logo.png" alt="Universe Empadas">
        <h1>Universe Empadas</h1>
      </div>
      <ul class="menu">
        <li data-page="dashboard" class="active">
          <i class="icon-dashboard"></i>
          Dashboard
        </li>
        <li data-page="produtos">
          <i class="icon-products"></i>
          Produtos
        </li>
        <li data-page="producao">
          <i class="icon-production"></i>
          Produção
        </li>
        <li data-page="vendas">
          <i class="icon-sales"></i>
          Vendas
        </li>
        <li data-page="estoque">
          <i class="icon-stock"></i>
          Estoque
        </li>
        <li data-page="relatorios">
          <i class="icon-reports"></i>
          Relatórios
        </li>
      </ul>
    </nav>

    <main class="content">
      <header class="header">
        <h2 id="page-title">Dashboard</h2>
        <div class="header-actions">
          <button id="backend-status" class="status-indicator">
            <span class="status-dot" id="status-dot"></span>
            Backend
          </button>
        </div>
      </header>

      <div id="page-content" class="page-content">
        <!-- Conteúdo das páginas será carregado aqui -->
        <div class="dashboard-cards">
          <div class="card">
            <h3>Hoje</h3>
            <div class="metric">
              <span class="value" id="vendas-hoje">0</span>
              <span class="label">Vendas</span>
            </div>
          </div>
          <div class="card">
            <h3>Produção</h3>
            <div class="metric">
              <span class="value" id="producao-hoje">0</span>
              <span class="label">Unidades</span>
            </div>
          </div>
          <div class="card">
            <h3>Estoque</h3>
            <div class="metric">
              <span class="value" id="estoque-total">0</span>
              <span class="label">Unidades</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
