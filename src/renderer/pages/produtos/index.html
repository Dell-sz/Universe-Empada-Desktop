<!DOCTYPE html>

</head>

        <tr>
          <th>Nome</th>

          <th>Custo</th>

        </tr>
      </thead>
      <tbody id="produtos-table">
        <!-- Produtos carregados via JS -->

    </table>
  </div>

  <script src="produtos.js"></script>

</html>
