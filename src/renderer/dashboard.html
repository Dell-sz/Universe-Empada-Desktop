<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe da Empada - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }
        
        .app {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 260px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        
        .logo h1 {
            font-size: 1.3rem;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .menu {
            list-style: none;
        }
        
        .menu li {
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .menu li:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .menu li.active {
            background: rgba(255,255,255,0.2);
        }
        
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .top-bar {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .card-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #5a67d8;
        }
        
        .btn-success {
            background: #48bb78;
        }
        
        .btn-success:hover {
            background: #38a169;
        }
        
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 15px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .error {
            color: #dc3545;
            padding: 20px;
            background: #f8d7da;
            border-radius: 10px;
            text-align: center;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-danger {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="logo">
                <h1>🌌 Universe da Empada</h1>
            </div>
            <ul class="menu">
                <li class="active">📊 Dashboard</li>
                <li>📦 Produtos</li>
                <li>🏭 Produção</li>
                <li>💰 Vendas</li>
                <li>📋 Estoque</li>
                <li>📈 Relatórios</li>
            </ul>
        </div>
        
        <div class="content">
            <div class="top-bar">
                <h2>Dashboard</h2>
                <p style="color: #666; margin-top: 5px;">Bem-vindo ao sistema de controle de produção</p>
            </div>
            
            <div class="cards">
                <div class="card">
                    <h3>Total de Produtos</h3>
                    <div class="card-value" id="total-produtos">-</div>
                </div>
                <div class="card">
                    <h3>Estoque Baixo</h3>
                    <div class="card-value" id="estoque-baixo">-</div>
                </div>
                <div class="card">
                    <h3>Produção Hoje</h3>
                    <div class="card-value" id="producao-hoje">-</div>
                </div>
                <div class="card">
                    <h3>Vendas Hoje</h3>
                    <div class="card-value" id="vendas-hoje">R$ -</div>
                </div>
            </div>
            
            <div style="margin-bottom: 20px;">
                <button class="btn" onclick="showProducao()">+ Registrar Produção</button>
                <button class="btn btn-success" onclick="showVenda()">+ Registrar Venda</button>
                <button class="btn" onclick="carregarDados()">⟳ Atualizar</button>
            </div>
            
            <h3>Produtos Cadastrados</h3>
            <div id="produtos-list">
                <div class="loading">Carregando produtos...</div>
            </div>
        </div>
    </div>
    
    <script>
const API_URL = 'http://localhost:3001/api';
        
        async function carregarDados() {
            await carregarProdutos();
            await carregarEstoqueBaixo();
        }
        
        async function carregarProdutos() {
            try {
                const response = await fetch(API_URL + '/produtos');
                const produtos = await response.json();
                
                document.getElementById('total-produtos').textContent = produtos.length;
                
                const produtosList = document.getElementById('produtos-list');
                if (produtos.length > 0) {
                    let html = '<table><thead><tr>';
                    html += '<th>ID</th><th>Nome</th><th>Categoria</th><th>Preço</th><th>Estoque Mínimo</th>';
                    html += '</tr></thead><tbody>';
                    
                    for (const p of produtos) {
                        html += '<tr>';
                        html += '<td>' + p.id + '</td>';
                        html += '<td><strong>' + p.nome + '</strong></td>';
                        html += '<td>' + p.categoria + '</td>';
                        html += '<td>R$ ' + parseFloat(p.preco_venda).toFixed(2) + '</td>';
                        html += '<td>' + p.estoque_minimo + '</td>';
                        html += '</tr>';
                    }
                    
                    html += '</tbody></table>';
                    produtosList.innerHTML = html;
                } else {
                    produtosList.innerHTML = '<div class="loading">Nenhum produto cadastrado. Clique em "Adicionar Produto" para começar.</div>';
                }
            } catch (error) {
                console.error('Erro ao carregar produtos:', error);
                document.getElementById('produtos-list').innerHTML = '<div class="error">Erro ao carregar dados: ' + error.message + '</div>';
            }
        }
        
        async function carregarEstoqueBaixo() {
            try {
                const response = await fetch(API_URL + '/produtos/low-stock');
                const lowStock = await response.json();
                document.getElementById('estoque-baixo').textContent = lowStock.length;
            } catch (error) {
                console.error('Erro ao carregar estoque baixo:', error);
            }
        }
        
        function showProducao() {
            alert('Funcionalidade de registro de produção será implementada em breve.');
        }
        
        function showVenda() {
            alert('Funcionalidade de registro de venda será implementada em breve.');
        }
        
        // Carregar dados ao iniciar
        carregarDados();
        
        // Atualizar a cada 30 segundos
        setInterval(carregarDados, 30000);
        
        // Adicionar evento de navegação
        document.querySelectorAll('.menu li').forEach((item, index) => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.menu li').forEach(li => li.classList.remove('active'));
                item.classList.add('active');
                
                const pageName = item.textContent.trim();
                document.querySelector('.top-bar h2').textContent = pageName;
                
                if (pageName === '📊 Dashboard') {
                    carregarDados();
                } else {
                    alert('Página "' + pageName + '" em desenvolvimento.');
                }
            });
        });
    </script>
</body>
</html>
